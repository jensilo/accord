services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__Default: "Host=db;Database=accord;Username=accord;Password=accord"
      Auth__CookieName: "accord.session"
      Auth__MagicLinkTtlMinutes: "15"
      Mail__Host: "maildev"
      Mail__Port: "25"
      Mail__From: "accord@localhost"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: accord
      POSTGRES_USER: accord
      POSTGRES_PASSWORD: accord
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accord"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  maildev:
    image: maildev/maildev
    ports:
      - "1080:1080"
    restart: unless-stopped

volumes:
  postgres_data:
